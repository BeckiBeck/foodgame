:pointer;transition:.16s}.btn:hover{transform:translateY(-2px)}.main{background:linear-gradient(135deg,#ff6f7d,#ffb13c);color:#fff}.soft{background:#fff;color:var(--ink);border:2px solid rgba(24,51,74,.08)}
.bodyCard{background:linear-gradient(180deg,rgba(237,255,244,.92),rgba(255,255,255,.85));display:flex;flex-direction:column}.bodyWrap{display:flex;flex-direction:column;gap:12px;align-items:stretch;flex:1}.kid{height:330px;border-radius:34px;background:linear-gradient(180deg,#dbf7ff,#fff);border:3px solid #fff;box-shadow:inset 0 -10px 25px rgba(66,116,136,.1);position:relative;overflow:hidden;display:grid;place-items:center}.kidObject{width:min(250px,90%);height:100%;border:0;transition:.25s}.kidObject.pulse,.bodySvg.pulse{animation:kidPop .55s ease}.body-outline{fill:url(#bodyFill);stroke:url(#outlineGrad);stroke-width:8;stroke-linecap:round;stroke-linejoin:round;filter:url(#softShadow)}.body-inner{fill:none;stroke:#8fbbe8;stroke-width:4;stroke-linecap:round;opacity:.28}.body-zone{opacity:.22;filter:grayscale(1);transition:opacity .3s ease,filter .3s ease,transform .3s ease;transform-origin:center}.body-zone.on{opacity:.92;filter:grayscale(0)}.body-zone.flash{opacity:1;filter:grayscale(0) drop-shadow(0 0 10px rgba(255,215,94,.8));transform:scale(1.07)}.status{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.need{background:#fff;border-radius:19px;padding:9px 10px;border:2px solid rgba(24,51,74,.08);box-shadow:0 5px 10px rgba(39,83,112,.05)}.needTop{display:flex;justify-content:space-between;align-items:center;gap:6px;font-weight:1000}.needIcon{font-size:24px}.bar{height:14px;background:#edf4f6;border-radius:999px;overflow:hidden;margin-top:7px}.fill{height:100%;width:0;border-radius:999px;transition:.32s;background:linear-gradient(90deg,#77df83,#67d2ff)}.need.too .fill{background:linear-gradient(90deg,#ff9c45,#ff6f7d)}.need.done{outline:3px solid rgba(88,215,123,.25)}.feedback{margin-top:12px;background:#fff;border-radius:25px;box-shadow:var(--softshadow);padding:12px 14px;display:grid;grid-template-columns:44px 1fr;gap:10px;align-items:center;min-height:70px;border:3px solid rgba(255,255,255,.9)}.feedback .ficon{font-size:34px}.feedback .ftext{font-size:16px;font-weight:1000;line-height:1.25;text-align:left}.feedback.warn{background:#fff4f4;border-color:#ffc5ca}.feedback.good{background:#effff3;border-color:#bdf2ca}.overlay{display:none;position:fixed;inset:0;background:rgba(24,51,74,.45);z-index:99;place-items:center;padding:16px}.overlay.show{display:grid}.modal{width:min(560px,100%);background:#fff;border-radius:38px;padding:25px;text-align:center;box-shadow:0 30px 90px rgba(0,0,0,.28);border:5px solid rgba(255,255,255,.8)}.modal .big{font-size:92px}.modal h2{font-size:clamp(34px,8vw,54px);margin:0;letter-spacing:-.06em}.modal p{font-weight:950;color:#526b7b;font-size:18px}.legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;justify-content:center}.legend span{background:rgba(255,255,255,.76);border-radius:999px;padding:8px 10px;font-weight:1000;font-size:13px;box-shadow:var(--softshadow)}.confetti{position:fixed;font-size:28px;pointer-events:none;z-index:120;animation:confetti 1.1s ease-out forwards}.dragGhost{position:fixed;z-index:200;pointer-events:none;font-size:64px;filter:drop-shadow(0 16px 20px rgba(0,0,0,.18));transform:translate(-50%,-50%)}

const DB_FILE_NAME='koerperhelden_datenbank.xlsx';
function parseDbList(v){return String(v||'').split(',').map(x=>x.trim()).filter(Boolean);}
function parseDbNumber(v, emptyValue=0){
  if(v===undefined||v===null||String(v).trim()==='') return emptyValue;
  const n=Number(String(v).replace(',','.'));
  return Number.isFinite(n)?n:emptyValue;
}
function rowsFromSheet(workbook,sheetName){
  const sheet=workbook.Sheets[sheetName];
  return sheet?XLSX.utils.sheet_to_json(sheet,{defval:''}):[];
}
function applyExcelDatabase(workbook){
  if(!window.XLSX) throw new Error('XLSX-Bibliothek wurde nicht geladen.');
  const nutrientKeys=Object.keys(nutrients);
  const nutrientRows=rowsFromSheet(workbook,'Nutrients');
  nutrientRows.forEach(row=>{
    const key=String(row.key||'').trim();
    if(key && nutrients[key]){
      if(row.label) nutrients[key].label=String(row.label);
      if(row.icon) nutrients[key].icon=String(row.icon);
      if(row.color) nutrients[key].color=String(row.color);
    }
  });
  const foodRows=rowsFromSheet(workbook,'Foods');
  const nextFoods=foodRows.map(row=>{
    const id=String(row.id||'').trim();
    if(!id) return null;
    const v={};
    nutrientKeys.forEach(k=>{const n=parseDbNumber(row[k],0); if(n!==0)v[k]=n;});
    return {id,n:String(row.name||row.n||id).trim(),e:String(row.emoji||row.e||'🍽️').trim(),v,tags:parseDbList(row.tags)};
  }).filter(Boolean);
  const missionRows=rowsFromSheet(workbook,'Missions');
  const nextMissions=missionRows.map((row,i)=>{
    const title=String(row.title||row.t||'Mission '+(i+1)).trim();
    const needs={}, max={};
    nutrientKeys.forEach(k=>{
      if(String(row['need_'+k]??'').trim()!=='') needs[k]=parseDbNumber(row['need_'+k],0);
      if(String(row['max_'+k]??'').trim()!=='') max[k]=parseDbNumber(row['max_'+k],999);
    });
    const pool=parseDbList(row.pool_ids||row.pool);
    if(!title || !pool.length) return null;
    return {t:title,h:String(row.hint||row.h||'Wähle passende Lebensmittel.').trim(),m:String(row.mascot||row.m||'🎯').trim(),needs,max,pool};
  }).filter(Boolean);
  if(!nextFoods.length || !nextMissions.length) throw new Error('Die Excel-Datei braucht mindestens je eine gültige Zeile in Foods und Missions.');
  const validIds=new Set(nextFoods.map(f=>f.id));
  nextMissions.forEach(m=>{m.pool=m.pool.filter(id=>validIds.has(id));});
  missions=nextMissions.filter(m=>m.pool.length);
  foods=nextFoods;
  missionIndex=0; selected=[]; solved=new Set(); stars=0; plates=0;
  $('missionTotal').textContent=missions.length;
  initMission();
  feedback('🛒','Einkauf aktualisiert: '+foods.length+' Lebensmittel, '+missions.length+' Missionen.','good');
}
function showShoppingSuccessPopup(){
  for(let i=0;i<18;i++)setTimeout(()=>confetti(),i*30);
  $('modalIcon').textContent='🛒';
  $('modalTitle').textContent='Einkauf erledigt!';
  $('winText').textContent='Nun wurden alle Lebensmittel erfolgreich eingekauft.';
  $('nextBtn').textContent='Weiter spielen ✅';
  $('nextBtn').disabled=false;
  $('nextBtn').dataset.mode='close';
  $('overlay').classList.add('show');
}
async function shopFromExcelDatabase(){
  if(!window.XLSX){feedback('⚠️','Die Excel-Bibliothek konnte nicht geladen werden.','warn'); return;}
  try{
    const response=await fetch(DB_FILE_NAME,{cache:'no-store'});
    if(!response.ok) throw new Error('Datei nicht gefunden: '+DB_FILE_NAME);
    const buffer=await response.arrayBuffer();
    applyExcelDatabase(XLSX.read(buffer,{type:'array'}));
    showShoppingSuccessPopup();
  }catch(err){
    feedback('⚠️','Einkaufen nicht möglich: Lege '+DB_FILE_NAME+' in denselben Ordner wie diese HTML-Datei und öffne das Spiel über einen lokalen Webserver.','warn');
  }
}

let missionIndex=0, selected=[], stars=0, plates=0, solved=new Set(), dragId=null, ghost=null, breakTimer=null;
const $=id=>document.getElementById(id);
$('missionTotal').textContent=missions.length; updateTopCounters();
function val(){const o={energy:0,protein:0,vitamins:0,fiber:0,calcium:0,focus:0,sweet:0,fat:0,water:0}; selected.forEach(id=>{const f=foods.find(x=>x.id===id); Object.entries(f.v).forEach(([k,v])=>o[k]+=v);}); return o;}
function initMission(){selected=[]; const m=missions[missionIndex]; $('missionTitle').textContent=m.t; $('missionHint').textContent=m.h; $('mascot').textContent=m.m; renderFoods(); renderPlate(); renderStatus(); feedback('👋','Zieh passende Lebensmittel auf den Teller.', ''); setFace('🙂'); updateTopCounters();}
function renderFoods(){const m=missions[missionIndex]; $('foods').innerHTML=m.pool.map(id=>{const f=foods.find(x=>x.id===id); return `<button class="food" draggable="true" data-id="${id}" aria-label="${f.n}"><div><div class="emoji">${f.e}</div><div class="name">${f.n}</div><div class="dots">${f.tags.map(t=>`<span class="dot ${t}"></span>`).join('')}</div></div></button>`}).join(''); document.querySelectorAll('.food').forEach(el=>{el.addEventListener('click',()=>addFood(el.dataset.id)); el.addEventListener('dragstart',e=>{dragId=el.dataset.id;}); el.addEventListener('pointerdown',startTouchDrag);});}
function addFood(id){selected.push(id); renderPlate(); renderStatus(id); const f=foods.find(x=>x.id===id); const totals=val(); let msg=`${f.e} ${f.n} liegt auf deinem Teller.`; let cls=''; let icon='👍'; if(totals.sweet>(missions[missionIndex].max.sweet||999)){msg='Zu viel Süßes: Ich habe nun Bauchweh. Nimm etwas Süßes vom Teller oder gib dem Körper mehr Balance.'; icon='🤕'; cls='warn'; setFace('😟');} else if(id==='chocolate' || id==='cake'){msg='Lecker! Süßes gibt schnelle Energie. Zu viel davon kann Bauchweh machen.'; icon='🍫';} else {setFace('🙂');} pulseBody(); feedback(icon,msg,cls);}
function renderPlate(){const p=$('plate'); p.classList.toggle('hasFood',selected.length>0); p.innerHTML='<div class="plateHint">Hier ablegen 🍽️</div>'+selected.map((id,i)=>`<button class="onPlate" data-index="${i}" title="Wegnehmen" aria-label="${foods.find(f=>f.id===id).n} vom Teller nehmen">${foods.find(f=>f.id===id).e}</button>`).join(''); p.querySelectorAll('.onPlate').forEach(btn=>btn.addEventListener('click',()=>removeFood(Number(btn.dataset.index))));}
function renderStatus(activeFoodId){const m=missions[missionIndex], totals=val(); const keys=[...new Set([...Object.keys(m.needs),...Object.keys(m.max||{})])]; $('status').innerHTML=keys.map(k=>{const target=m.needs[k]||m.max[k]||100; const isMax=!(k in m.needs); const pct=Math.min(130,Math.round(totals[k]/target*100)); const done=!isMax && totals[k]>=target; const too=isMax && totals[k]>target; return `<div class="need ${done?'done':''} ${too?'too':''}"><div class="needTop"><span><span class="needIcon">${nutrients[k].icon}</span> ${nutrients[k].label}</span><span>${isMax?(too?'zu viel':'ok'):(done?'✓':'…')}</span></div><div class="bar"><div class="fill" style="width:${Math.min(100,pct)}%;background:${too?'linear-gradient(90deg,#ff9c45,#ff6f7d)':nutrients[k].color}"></div></div></div>`}).join(''); updateBodyHighlights(activeFoodId);}
function feedback(icon,text,cls){const f=$('feedback'); f.className='feedback '+(cls||''); if(cls==='good') f.classList.add('good'); f.innerHTML=`<div class="ficon">${icon}</div><div class="ftext">${text}</div>`;}
function check(){const m=missions[missionIndex], totals=val(); const missing=Object.entries(m.needs).filter(([k,t])=>totals[k]<t).map(([k])=>nutrients[k].icon); const too=Object.entries(m.max||{}).filter(([k,t])=>totals[k]>t).map(([k])=>k); if(too.length){let msg='Davon ist gerade zu viel auf dem Teller.'; if(too.includes('sweet')) msg='Zu viel Süßes: Ich habe nun Bauchweh. Nimm etwas weg und gib dem Körper noch andere Helfer.'; if(too.includes('fat')) msg='Sehr viel Fett auf einmal: Mein Bauch arbeitet jetzt ganz schön schwer.'; feedback('🤕',msg,'warn'); setFace('😟'); shake($('plate')); return;} if(missing.length){feedback('🔎','Es fehlt noch: '+missing.join(' ')+' Zieh noch etwas Passendes auf den Teller.',''); return;} if(!solved.has(missionIndex)){solved.add(missionIndex); stars+=3; plates+=1;} updateTopCounters(); feedback('🎉','Super Teller! Alle wichtigen Körperbereiche sind versorgt.','good'); if(solved.size>=missions.length){startBreak();}else{win();}}
function win(){for(let i=0;i<24;i++)setTimeout(()=>confetti(),i*25); $('modalIcon').textContent='🎉'; $('modalTitle').textContent='Geschafft!'; $('winText').textContent='Du hast den Körper gut versorgt – ohne Verbote, mit Balance.'; $('nextBtn').textContent='Nächste Mission 🚀'; $('nextBtn').disabled=false; $('nextBtn').dataset.mode='next'; $('overlay').classList.add('show'); setFace('😄');}
function confetti(){const c=document.createElement('div'); c.className='confetti'; c.textContent=['⭐','🌟','🍓','🥕','✨','🎈'][Math.floor(Math.random()*6)]; c.style.left=Math.random()*100+'vw'; c.style.top=70+Math.random()*25+'vh'; document.body.appendChild(c); setTimeout(()=>c.remove(),1200);}
function shake(el){el.animate([{transform:'translateX(0)'},{transform:'translateX(-8px)'},{transform:'translateX(8px)'},{transform:'translateX(0)'}],{duration:280});}
function removeFood(index){const f=foods.find(x=>x.id===selected[index]); selected.splice(index,1); renderPlate(); renderStatus(); feedback('↩️',`${f.e} ${f.n} wurde vom Teller genommen.`,''); setFace('🙂');}
function undo(){if(!selected.length)return; removeFood(selected.length-1);}
function next(){missionIndex=(missionIndex+1)%missions.length; $('overlay').classList.remove('show'); initMission();}
function updateTopCounters(){$('solvedCount').textContent=solved.size; $('stars').textContent=stars; $('plates').textContent=plates;}
function setFace(face){/* Der neue professionelle Körper hat kein Gesicht mehr. */}
function pulseBody(){const svg=$('bodySvg'); if(!svg)return; svg.classList.remove('pulse'); void svg.offsetWidth; svg.classList.add('pulse');}
function regionIsFilled(region,totals,m){
  const req=m.needs||{};
  if(region==='brain') return req.focus ? totals.focus>=req.focus : false;
  if(region==='heart') return req.water ? totals.water>=req.water : false;
  if(region==='shield') return req.vitamins ? totals.vitamins>=req.vitamins : false;
  if(region==='belly') return (req.energy&&totals.energy>=req.energy)||(req.fiber&&totals.fiber>=req.fiber);
  if(region==='muscles') return req.protein ? totals.protein>=req.protein : false;
  return false;
}
function foodHitsRegion(food,region){
  if(!food)return false; const v=food.v||{};
  if(region==='brain') return (v.focus||0)>0;
  if(region==='heart') return (v.water||0)>0;
  if(region==='shield') return (v.vitamins||0)>0;
  if(region==='belly') return (v.energy||0)>0 || (v.fiber||0)>0 || (v.sweet||0)>0;
  if(region==='muscles') return (v.protein||0)>0;
  return false;
}
function updateBodyHighlights(activeFoodId){
  const svg=$('bodySvg'); if(!svg)return;
  const totals=val(), m=missions[missionIndex];
  const active=activeFoodId?foods.find(f=>f.id===activeFoodId):null;
  svg.querySelectorAll('.body-zone').forEach(zone=>{
    const region=zone.dataset.region;
    const filled=regionIsFilled(region,totals,m);
    const hit=foodHitsRegion(active,region);
    zone.classList.toggle('on',filled);
    zone.classList.toggle('flash',!!hit);
    if(hit)setTimeout(()=>zone.classList.remove('flash'),700);
  });
}
function startBreak(){for(let i=0;i<10;i++)setTimeout(()=>confetti(),i*20); const until=Date.now()+30*60*1000; localStorage.setItem('koerperheldenPauseBis',String(until)); showBreak(until);}
function showBreak(until){clearInterval(breakTimer); $('modalIcon').textContent='🌳'; $('modalTitle').textContent='Alle 12 Rätsel gelöst!'; $('nextBtn').disabled=true; $('nextBtn').textContent='Pause läuft'; $('nextBtn').dataset.mode='break'; $('overlay').classList.add('show'); const tick=()=>{const left=Math.max(0,until-Date.now()); const min=String(Math.floor(left/60000)).padStart(2,'0'); const sec=String(Math.floor((left%60000)/1000)).padStart(2,'0'); $('winText').innerHTML=`Mache nun 30 Minuten Pause und geh spielen. Gerne kannst du später wieder kommen.<br><strong style="font-size:34px;color:#18334a">${min}:${sec}</strong>`; if(left<=0){clearInterval(breakTimer); localStorage.removeItem('koerperheldenPauseBis'); $('nextBtn').disabled=false; $('nextBtn').textContent='Weiter spielen 🚀'; $('winText').textContent='Die Pause ist vorbei. Du kannst wieder loslegen!';}}; tick(); breakTimer=setInterval(tick,1000);}
$('plate').addEventListener('dragover',e=>{e.preventDefault(); $('plate').classList.add('dragOver');}); $('plate').addEventListener('dragleave',()=>$('plate').classList.remove('dragOver')); $('plate').addEventListener('drop',e=>{e.preventDefault(); $('plate').classList.remove('dragOver'); if(dragId)addFood(dragId); dragId=null;});
function startTouchDrag(e){if(e.pointerType==='mouse')return; const id=e.currentTarget.dataset.id; const emoji=foods.find(f=>f.id===id).e; ghost=document.createElement('div'); ghost.className='dragGhost'; ghost.textContent=emoji; document.body.appendChild(ghost); moveGhost(e); e.currentTarget.setPointerCapture(e.pointerId); e.currentTarget.addEventListener('pointermove',moveGhost); e.currentTarget.addEventListener('pointerup',endTouchDrag,{once:true}); function endTouchDrag(ev){document.querySelectorAll('.food').forEach(x=>x.removeEventListener('pointermove',moveGhost)); const r=$('plate').getBoundingClientRect(); const inside=ev.clientX>=r.left&&ev.clientX<=r.right&&ev.clientY>=r.top&&ev.clientY<=r.bottom; if(ghost)ghost.remove(); ghost=null; if(inside)addFood(id);} }
function moveGhost(e){if(!ghost)return; ghost.style.left=e.clientX+'px'; ghost.style.top=e.clientY+'px';}
$('shopBtn').onclick=shopFromExcelDatabase; $('undoBtn').onclick=undo; $('checkBtn').onclick=check; $('newBtn').onclick=()=>{missionIndex=Math.floor(Math.random()*missions.length);initMission();}; $('nextBtn').onclick=()=>{if($('nextBtn').dataset.mode==='close'){$('overlay').classList.remove('show'); $('nextBtn').dataset.mode='next';}else{next();}};
const pauseBis=Number(localStorage.getItem('koerperheldenPauseBis')||0); initMission(); if(pauseBis>Date.now()) showBreak(pauseBis);
</script>
